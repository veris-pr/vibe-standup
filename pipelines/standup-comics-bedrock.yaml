# Standup Comics Pipeline — AWS Bedrock (cloud)
# Uses AWS services instead of local models:
#   ASR:   Amazon Transcribe (batch)
#   LLM:   Claude Haiku via Bedrock
#   Image: Stability AI SDXL via Bedrock
#
# Prerequisites:
#   1. AWS CLI installed and configured (`aws configure` or ~/.standup/.env)
#   2. Bedrock model access enabled in your AWS account
#   3. S3 bucket for temporary audio upload
#
# Usage:
#   cp pipelines/standup-comics-bedrock.yaml ~/.standup/pipelines/
#   standup start --pipeline standup-comics-bedrock

name: standup-comics-bedrock
description: Generate superhero comics from standup meetings (AWS Bedrock)

live:
  mic:
    - plugin: noise-gate
      config:
        threshold_db: "-40"
        hold_ms: "100"
    - plugin: normalize
      config:
        target_lufs: "-16"
  system:
    - plugin: normalize
      config:
        target_lufs: "-16"

stages:
  - id: transcribe
    plugin: bedrock-transcribe
    input: audio_chunks
    config:
      s3_bucket: "${STANDUP_S3_BUCKET}"
      language: hi-IN
      region: us-east-1
      # profile: my-aws-profile  # uncomment to use a named profile

  - id: diarize
    plugin: channel-diarizer
    input: audio_chunks

  - id: clean-transcript
    plugin: bedrock-llm
    inputs:
      - transcribe.output
      - diarize.output
    config:
      model_id: anthropic.claude-3-haiku-20240307-v1:0
      region: us-east-1

  - id: comic-script
    plugin: bedrock-llm
    input: clean-transcript.output
    config:
      model_id: anthropic.claude-3-haiku-20240307-v1:0
      region: us-east-1

  - id: panel-render
    plugin: bedrock-image-gen
    input: comic-script.output
    config:
      model_id: stability.stable-diffusion-xl-v1
      width: "512"
      height: "512"
      steps: "30"
      region: us-east-1

  - id: comic-assemble
    plugin: comic-renderer
    inputs:
      - comic-script.output
      - panel-render.output
