# Standup Comics Pipeline — mlx-whisper variant
# Uses mlx-whisper (Apple Silicon native) instead of whisper.cpp for transcription.
# Requires: uv venv with mlx-whisper installed (.venv/bin/python3)

name: standup-comics-mlx
description: Generate superhero comics from standup meetings (mlx-whisper)

live:
  mic:
    - plugin: noise-gate
      config:
        threshold_db: "-40"
        hold_ms: "100"
    - plugin: normalize
      config:
        target_lufs: "-16"
  system:
    - plugin: normalize
      config:
        target_lufs: "-16"

stages:
  - id: transcribe
    plugin: mlx-whisper
    input: audio_chunks
    config:
      model: mlx-community/whisper-large-v3-turbo
      language: hi

  - id: diarize
    plugin: channel-diarizer
    input: audio_chunks

  - id: clean-transcript
    plugin: transcript-merger
    inputs:
      - transcribe.output
      - diarize.output

  - id: comic-script
    plugin: comic-script
    input: clean-transcript.output
    config:
      model: gemma3:4b
      max_panels: "8"

  - id: panel-render
    plugin: image-gen
    input: comic-script.output
    config:
      model: schnell
      steps: "4"
      width: "512"
      height: "512"

  - id: comic-assemble
    plugin: comic-renderer
    inputs:
      - comic-script.output
      - panel-render.output
