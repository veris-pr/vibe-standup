# Standup Comics Pipeline (Gemini Transcription)
# Same as standup-comics but uses Gemini API for transcription instead of whisper.
# Requires GEMINI_API_KEY environment variable.

name: standup-comics-gemini
description: Generate superhero comics from standup meetings (Gemini transcription)

# Live plugins: audio filter chains active during capture
live:
  mic:
    - plugin: noise-gate
      config:
        threshold_db: "-40"
        hold_ms: "100"
    - plugin: normalize
      config:
        target_lufs: "-16"
  system:
    - plugin: normalize
      config:
        target_lufs: "-16"

# Stage plugins: post-session processing DAG
stages:
  - id: transcribe
    plugin: gemini-transcription
    input: audio_chunks
    config:
      model: gemini-2.5-flash

  - id: diarize
    plugin: channel-diarizer
    input: audio_chunks

  - id: clean-transcript
    plugin: transcript-merger
    inputs:
      - transcribe.output
      - diarize.output

  - id: comic-script
    plugin: comic-script
    input: clean-transcript.output
    config:
      model: gemma3:4b
      max_panels: "8"

  - id: panel-render
    plugin: image-gen
    input: comic-script.output
    config:
      model: schnell
      steps: "4"
      width: "512"
      height: "512"

  - id: comic-assemble
    plugin: comic-renderer
    inputs:
      - comic-script.output
      - panel-render.output
